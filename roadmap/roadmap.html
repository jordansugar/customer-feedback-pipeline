// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const id = 'toast-' + (++toastIdCounter);
  const div = document.createElement('div');
  div.className = 'toast';
  div.id = id;
  div.innerHTML = `<span>${escHtml(msg)}</span><button class="toast-dismiss" onclick="dismissToast('${id}')" title="Dismiss">✕</button>`;
  container.appendChild(div);
  requestAnimationFrame(() => div.classList.add('show'));
  setTimeout(() => dismissToast(id), 4000);
}

function dismissToast(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('show');
  setTimeout(() => el.remove(), 200);
}

// ── Custom order / drag-and-drop ──────────────────────────────────────────────
function loadCustomOrder() {
  try { customOrder = JSON.parse(localStorage.getItem(ROADMAP_ORDER_KEY) || '[]'); }
  catch { customOrder = []; }
}

function saveCustomOrder() {
  localStorage.setItem(ROADMAP_ORDER_KEY, JSON.stringify(customOrder));
}

function applyCustomOrder(inits) {
  if (!customOrder.length) return inits;
  return [...inits].sort((a, b) => {
    const ai = customOrder.indexOf(a.id);
    const bi = customOrder.indexOf(b.id);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
}

function initDragStart(event, id) {
  dragSrcId = id;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', id);
  const section = document.querySelector(`.initiative-block[data-id="${CSS.escape(id)}"]`);
  if (section) {
    event.dataTransfer.setDragImage(section, 24, 24);
    setTimeout(() => section.classList.add('dragging'), 0);
  }
  event.stopPropagation();
}

function initDragOver(event) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  const block = event.target.closest('#initiative-list > .initiative-block');
  if (!block || block.dataset.id === dragSrcId) return;
  document.querySelectorAll('#initiative-list > .initiative-block')
    .forEach(b => b.classList.remove('drag-over-top', 'drag-over-bottom'));
  const rect = block.getBoundingClientRect();
  block.classList.add(event.clientY < rect.top + rect.height / 2 ? 'drag-over-top' : 'drag-over-bottom');
}

function initDrop(event, targetId) {
  event.preventDefault();
  document.querySelectorAll('#initiative-list > .initiative-block')
    .forEach(b => b.classList.remove('drag-over-top', 'drag-over-bottom', 'dragging'));
  if (!dragSrcId || dragSrcId === targetId) { dragSrcId = null; return; }

  const block = document.querySelector(`.initiative-block[data-id="${CSS.escape(targetId)}"]`);
  const insertBefore = block && event.clientY < block.getBoundingClientRect().top + block.getBoundingClientRect().height / 2;

  // Use the currently rendered order as base so the result matches what the user sees
  const current = [...document.querySelectorAll('#initiative-list > .initiative-block')].map(b => b.dataset.id);
  const next = current.filter(id => id !== dragSrcId);
  const idx = next.indexOf(targetId);
  next.splice(insertBefore ? idx : idx + 1, 0, dragSrcId);

  customOrder = next;
  saveCustomOrder();
  dragSrcId = null;
  renderRoadmap();
}

function initDragEnd() {
  document.querySelectorAll('#initiative-list > .initiative-block')
    .forEach(b => b.classList.remove('drag-over-top', 'drag-over-bottom', 'dragging'));
  dragSrcId = null;
}

// ── Sub-initiative drag-and-drop ───────────────────────────────────────────────
function loadSubInitOrder() {
  try { subInitOrder = JSON.parse(localStorage.getItem(ROADMAP_SUB_ORDER_KEY) || '{}'); }
  catch { subInitOrder = {}; }
}

function saveSubInitOrder() {
  localStorage.setItem(ROADMAP_SUB_ORDER_KEY, JSON.stringify(subInitOrder));
}

function applySubInitOrder(children, parentId) {
  const order = subInitOrder[parentId];
  if (!order || !order.length) return children;
  return [...children].sort((a, b) => {
    const ai = order.indexOf(a.id);
    const bi = order.indexOf(b.id);
    if (ai === -1 && bi === -1) return 0;
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
}

function subInitDragStart(event, id, parentId) {
  subDragSrcId = id;
  subDragParentId = parentId;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', id);
  const block = document.querySelector(`.sub-initiative-block[data-id="${CSS.escape(id)}"]`);
  if (block) {
    event.dataTransfer.setDragImage(block, 24, 12);
    setTimeout(() => block.classList.add('dragging'), 0);
  }
  event.stopPropagation();
}

function subInitDragOver(event, parentId) {
  if (subDragParentId !== parentId) return;
  event.preventDefault();
  event.stopPropagation();
  event.dataTransfer.dropEffect = 'move';
  const container = document.getElementById(`init-body-${CSS.escape(parentId)}`);
  if (!container) return;
  // Use direct child lookup to avoid matching deeply-nested blocks from different parents
  const block = [...container.querySelectorAll(':scope > .sub-initiative-block')]
    .find(b => b === event.target || b.contains(event.target));
  if (!block || block.dataset.id === subDragSrcId) return;
  container.querySelectorAll(':scope > .sub-initiative-block')
    .forEach(b => b.classList.remove('drag-over-top', 'drag-over-bottom'));
  const rect = block.getBoundingClientRect();
  block.classList.add(event.clientY < rect.top + rect.height / 2 ? 'drag-over-top' : 'drag-over-bottom');
}

function subInitDrop(event, targetId, parentId) {
  event.preventDefault();
  const container = document.getElementById(`init-body-${CSS.escape(parentId)}`);
  if (container) {
    container.querySelectorAll(':scope > .sub-initiative-block')
      .forEach(b => b.classList.remove('drag-over-top', 'drag-over-bottom', 'dragging'));
  }
  if (!subDragSrcId || subDragSrcId === targetId || subDragParentId !== parentId) {
    subDragSrcId = null; subDragParentId = null; return;
  }
  event.stopPropagation();
  const block = document.querySelector(`.sub-initiative-block[data-id="${CSS.escape(targetId)}"]`);
  const insertBefore = block && event.clientY < block.getBoundingClientRect().top + block.getBoundingClientRect().height / 2;
  const current = [...(container?.querySelectorAll(':scope > .sub-initiative-block') || [])].map(b => b.dataset.id);
  const next = current.filter(id => id !== subDragSrcId);
  const idx = next.indexOf(targetId);
  next.splice(insertBefore ? idx : idx + 1, 0, subDragSrcId);
  subInitOrder[parentId] = next;
  saveSubInitOrder();
  subDragSrcId = null;
  subDragParentId = null;
  renderRoadmap();
}

function subInitDragEnd() {
  document.querySelectorAll('.sub-initiative-block')
    .forEach(b => b.classList.remove('drag-over-top', 'drag-over-bottom', 'dragging'));
  subDragSrcId = null;
  subDragParentId = null;
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Timeline View ─────────────────────────────────────────────────────────────

function loadTimelineData() {
  try { timelineData = JSON.parse(localStorage.getItem(ROADMAP_TIMELINE_KEY) || '{}'); }
  catch { timelineData = {}; }
}
function saveTimelineData() {
  localStorage.setItem(ROADMAP_TIMELINE_KEY, JSON.stringify(timelineData));
}
function loadTlOffset() {
  try { tlMonthOffset = parseInt(localStorage.getItem(ROADMAP_TL_OFFSET_KEY) || '0', 10); }
  catch { tlMonthOffset = 0; }
}
function saveTlOffset() {
  localStorage.setItem(ROADMAP_TL_OFFSET_KEY, String(tlMonthOffset));
}

function setTimelineView(val) {
  timelineView = val;
  flatView = false;
  localStorage.setItem(ROADMAP_FLAT_VIEW_KEY, JSON.stringify(false));
  document.getElementById('view-hierarchy-btn').classList.remove('active');
  document.getElementById('view-flat-btn').classList.remove('active');
  document.getElementById('view-timeline-btn').classList.toggle('active', val);
  renderRoadmap();
}

function tlGetStart() {
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth() + tlMonthOffset, 1);
}
function tlGetEnd() {
  const s = tlGetStart();
  return new Date(s.getFullYear(), s.getMonth() + TL_N_MONTHS, 1);
}
function tlDateToXPx(dateStr, monthW) {
  const start = tlGetStart();
  const end = tlGetEnd();
  const d = new Date(dateStr + 'T00:00:00');
  return ((d - start) / (end - start)) * monthW * TL_N_MONTHS;
}
function tlXToDateStr(x, monthW) {
  const start = tlGetStart();
  const end = tlGetEnd();
  const ms = (x / (monthW * TL_N_MONTHS)) * (end - start);
  const d = new Date(start.getTime() + ms);
  return d.toISOString().slice(0, 10);
}

function tlNavPrev()  { tlMonthOffset -= 3; saveTlOffset(); renderRoadmap(); }
function tlNavNext()  { tlMonthOffset += 3; saveTlOffset(); renderRoadmap(); }
function tlNavToday() { tlMonthOffset = 0;  saveTlOffset(); renderRoadmap(); }

function toggleTlLane(l1Id) {
  if (collapsedTlLanes.has(l1Id)) collapsedTlLanes.delete(l1Id);
  else collapsedTlLanes.add(l1Id);
  renderRoadmap();
}
function toggleTlUnscheduled(l1Id) {
  if (expandedUnscheduled.has(l1Id)) expandedUnscheduled.delete(l1Id);
  else expandedUnscheduled.add(l1Id);
  renderRoadmap();
}
function tlClearItem(event, itemId) {
  event.stopPropagation();
  delete timelineData[itemId];
  saveTimelineData();
  renderRoadmap();
}

function renderTlItemRow(id, name, kind, color, monthW) {
  const dates = timelineData[id];
  const totalW = monthW * TL_N_MONTHS;
  const now = new Date();
  const todayX = tlDateToXPx(now.toISOString().slice(0, 10), monthW);
  const todayLine = (todayX >= 0 && todayX <= totalW)
    ? `<div class="tl-today-line" style="left:${todayX.toFixed(1)}px"></div>` : '';

  let barHtml = '';
  if (dates?.start && dates?.end) {
    const x = tlDateToXPx(dates.start, monthW);
    const w = Math.max(8, tlDateToXPx(dates.end, monthW) - x);
    const safeId = escHtml(id);
    barHtml = `
      <div class="tl-bar" data-tl-bar="${safeId}"
           style="left:${x.toFixed(1)}px;width:${w.toFixed(1)}px"
           onmousedown="tlBarMouseDown(event,'${safeId}')">
        <div class="tl-bar-handle l" onmousedown="tlResizeMouseDown(event,'${safeId}','l')"></div>
        <div class="tl-bar-inner" style="background:${escHtml(color)}">
          <span class="tl-bar-label">${escHtml(name)}</span>
          <button class="tl-bar-clear" onclick="tlClearItem(event,'${safeId}')">×</button>
        </div>
        <div class="tl-bar-handle r" onmousedown="tlResizeMouseDown(event,'${safeId}','r')"></div>
      </div>`;
  }

  const kindTag = kind === 'project' ? 'PROJ' : 'INIT';
  const safeId = escHtml(id);
  return `
    <div class="tl-item-row">
      <div class="tl-label-cell" style="width:${TL_LABEL_W}px">
        <span class="tl-kind-tag">${kindTag}</span>
        <span class="tl-label-text" title="${escHtml(name)}">${escHtml(name)}</span>
      </div>
      <div class="tl-row-grid${dates ? ' has-bar' : ''}" style="width:${totalW}px"
           onmousedown="tlDrawMouseDown(event,'${safeId}')">
        ${todayLine}${barHtml}
      </div>
    </div>`;
}

function renderTimelineHtml(ordered) {
  const monthW = TL_MONTH_W_MIN;
  tlMonthWidth = monthW;
  const totalW = monthW * TL_N_MONTHS;
  const start = tlGetStart();
  const end = tlGetEnd();
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();

  let monthCells = '';
  for (let m = 0; m < TL_N_MONTHS; m++) {
    const d = new Date(start.getFullYear(), start.getMonth() + m, 1);
    const isCur = d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    monthCells += `<div class="tl-month-cell${isCur ? ' tl-cur-month' : ''}" style="width:${monthW}px">${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}</div>`;
  }

  const endM = new Date(end.getFullYear(), end.getMonth() - 1, 1);
  const rangeLabel = `${MONTH_NAMES[start.getMonth()]} ${start.getFullYear()} – ${MONTH_NAMES[endM.getMonth()]} ${endM.getFullYear()}`;

  let html = `
<div class="tl-wrapper" style="--tl-month-w:${monthW}px">
  <div class="tl-nav">
    <button class="btn" onclick="tlNavPrev()">← Prev</button>
    <button class="btn" onclick="tlNavToday()">Today</button>
    <button class="btn" onclick="tlNavNext()">Next →</button>
    <span class="tl-nav-range">${rangeLabel}</span>
  </div>
  <div class="tl-header" style="top:var(--header-height)">
    <div class="tl-header-corner" style="width:${TL_LABEL_W}px;height:36px"></div>
    <div class="tl-months">${monthCells}</div>
  </div>`;

  for (const l1 of ordered) {
    const color = l1.color || '#5e6ad2';
    const isExpanded = !collapsedTlLanes.has(l1.id);
    const chevron = isExpanded ? '▾' : '▸';

    const l2s = (l1.children || []).filter(initiativeMatchesFilters);
    const orderedL2s = applySubInitOrder(l2s, l1.id);
    const directProjects = getVisibleProjects(l1);

    const allItems = [
      ...orderedL2s.map(i => ({ id: i.id, name: i.name, kind: 'initiative', color })),
      ...directProjects.map(p => ({ id: p.id, name: p.name, kind: 'project', color: '#6366f1' }))
    ];

    const scheduled   = allItems.filter(it => timelineData[it.id]);
    const unscheduled = allItems.filter(it => !timelineData[it.id]);

    const safeL1Id = escHtml(l1.id);
    html += `
  <div class="tl-lane">
    <div class="tl-lane-hdr" onclick="toggleTlLane('${safeL1Id}')">
      <div class="tl-label-cell" style="width:${TL_LABEL_W}px;background:#f9fafb;cursor:pointer">
        <span style="margin-right:4px;font-size:11px;color:var(--text-muted)">${chevron}</span>
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${escHtml(color)};flex-shrink:0;margin-right:4px"></span>
        <span class="tl-lane-label" style="color:${escHtml(color)}">${escHtml(l1.name)}</span>
      </div>
      <div class="tl-lane-hdr-bg" style="width:${totalW}px"></div>
    </div>`;

    if (isExpanded) {
      for (const it of scheduled) {
        html += renderTlItemRow(it.id, it.name, it.kind, it.color, monthW);
      }

      if (unscheduled.length > 0) {
        const isUnschedOpen = expandedUnscheduled.has(l1.id);
        const uChevron = isUnschedOpen ? '▾' : '▸';
        html += `
      <div class="tl-unsched-hdr" onclick="toggleTlUnscheduled('${safeL1Id}')">
        <div class="tl-label-cell" style="width:${TL_LABEL_W}px;cursor:pointer">
          <span style="font-size:10px;margin-right:4px;color:var(--text-muted)">${uChevron}</span>
          <span class="tl-unsched-label">Unscheduled (${unscheduled.length})</span>
        </div>
        <div style="flex:1"></div>
      </div>`;
        if (isUnschedOpen) {
          html += `<div class="tl-unsched-rows">`;
          for (const it of unscheduled) {
            html += renderTlItemRow(it.id, it.name, it.kind, it.color, monthW);
          }
          html += `</div>`;
        }
      }
    }

    html += `</div>`; // end .tl-lane
  }

  html += `</div>`; // end .tl-wrapper
  return html;
}

// ── Timeline mouse interactions ────────────────────────────────────────────────

function tlDrawMouseDown(event, itemId) {
  if (timelineData[itemId]) return; // bar exists, handled by tlBarMouseDown
  event.preventDefault();
  const rect = event.currentTarget.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const ghost = document.createElement('div');
  ghost.className = 'tl-bar-ghost';
  ghost.style.left = x + 'px';
  ghost.style.width = '0px';
  event.currentTarget.appendChild(ghost);
  tlDrag = { mode: 'draw', itemId, startX: event.clientX, rect, ghostEl: ghost };
}

function tlBarMouseDown(event, itemId) {
  event.stopPropagation();
  const d = timelineData[itemId];
  if (!d) return;
  event.preventDefault();
  const rect = event.currentTarget.closest('.tl-row-grid').getBoundingClientRect();
  tlDrag = { mode: 'move', itemId, startX: event.clientX,
             origStart: d.start, origEnd: d.end, rect };
}

function tlResizeMouseDown(event, itemId, side) {
  event.stopPropagation();
  const d = timelineData[itemId];
  if (!d) return;
  event.preventDefault();
  const rect = event.currentTarget.closest('.tl-row-grid').getBoundingClientRect();
  tlDrag = { mode: 'resize', itemId, startX: event.clientX, side,
             origStart: d.start, origEnd: d.end, rect };
}

function tlMouseMove(event) {
  if (!tlDrag) return;
  const { mode, itemId, startX, rect } = tlDrag;
  const dx = event.clientX - startX;
  const totalW = tlMonthWidth * TL_N_MONTHS;

  if (mode === 'draw') {
    const x0 = startX - rect.left;
    const x1 = Math.max(0, Math.min(totalW, event.clientX - rect.left));
    tlDrag.ghostEl.style.left  = Math.min(x0, x1) + 'px';
    tlDrag.ghostEl.style.width = Math.abs(x1 - x0) + 'px';
  } else if (mode === 'move') {
    const bar = document.querySelector(`[data-tl-bar="${CSS.escape(itemId)}"]`);
    if (bar) bar.style.transform = `translateX(${dx}px)`;
  } else if (mode === 'resize') {
    const bar = document.querySelector(`[data-tl-bar="${CSS.escape(itemId)}"]`);
    if (bar) {
      const origL = tlDateToXPx(tlDrag.origStart, tlMonthWidth);
      const origW = tlDateToXPx(tlDrag.origEnd, tlMonthWidth) - origL;
      if (tlDrag.side === 'r') {
        bar.style.width = Math.max(8, origW + dx) + 'px';
      } else {
        bar.style.left  = (origL + dx) + 'px';
        bar.style.width = Math.max(8, origW - dx) + 'px';
      }
    }
  }
}

function tlMouseUp(event) {
  if (!tlDrag) return;
  const { mode, itemId, startX, rect } = tlDrag;
  const dx = event.clientX - startX;
  const totalW = tlMonthWidth * TL_N_MONTHS;
  const msRange = tlGetEnd() - tlGetStart();

  if (mode === 'draw') {
    tlDrag.ghostEl.remove();
    const x0 = startX - rect.left;
    const x1 = Math.max(0, Math.min(totalW, event.clientX - rect.left));
    if (Math.abs(x1 - x0) > 4) {
      timelineData[itemId] = {
        start: tlXToDateStr(Math.min(x0, x1), tlMonthWidth),
        end:   tlXToDateStr(Math.max(x0, x1), tlMonthWidth)
      };
      saveTimelineData();
      renderRoadmap();
    }
  } else if (mode === 'move') {
    const msDelta = (dx / totalW) * msRange;
    const orig = timelineData[itemId];
    if (orig && Math.abs(dx) > 2) {
      timelineData[itemId] = {
        start: new Date(new Date(orig.start + 'T00:00:00').getTime() + msDelta).toISOString().slice(0, 10),
        end:   new Date(new Date(orig.end   + 'T00:00:00').getTime() + msDelta).toISOString().slice(0, 10)
      };
      saveTimelineData();
      renderRoadmap();
    } else {
      const bar = document.querySelector(`[data-tl-bar="${CSS.escape(itemId)}"]`);
      if (bar) bar.style.transform = '';
    }
  } else if (mode === 'resize') {
    const msDelta = (dx / totalW) * msRange;
    const orig = timelineData[itemId];
    if (orig) {
      if (tlDrag.side === 'r') {
        timelineData[itemId] = { start: orig.start,
          end: new Date(new Date(orig.end + 'T00:00:00').getTime() + msDelta).toISOString().slice(0, 10) };
      } else {
        timelineData[itemId] = {
          start: new Date(new Date(orig.start + 'T00:00:00').getTime() + msDelta).toISOString().slice(0, 10),
          end: orig.end };
      }
      saveTimelineData();
      renderRoadmap();
    }
  }
  tlDrag = null;
}
